name: FIN-BOT atualizacao ao vivo

on:
  schedule:
    - cron: "*/15 1-22 * * 1-5"
    - cron: "0 12 * * 0,6"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: live-report
  cancel-in-progress: true

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Gerar pagina
        run: python finbot.py --force html
      - name: Commit
        run: |
          git config user.name "fin-bot"
          git config user.email "actions@github.com"
          git add docs/
          git diff --cached --quiet || git commit -m "live: $(date -u +'%F %H:%M UTC')"
          git push